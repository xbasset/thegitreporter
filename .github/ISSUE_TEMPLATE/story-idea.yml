name: Story idea
description: Suggest a possible software-change story.
title: "Story idea: "
labels:
  - story idea
body:
  - type: markdown
    attributes:
      value: Story ideas can also start in Discussions if you want a looser conversation.
  - type: textarea
    id: idea
    attributes:
      label: What changed?
      description: Describe the software change and why it may matter.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Public evidence
      description: Add commits, PRs, issues, docs, release notes, or other links.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why should readers care?
    validations:
      required: false
