name: Site bug
description: Report a broken page, link, feed, archive, or static-site issue.
title: "Site bug: "
labels:
  - bug
body:
  - type: input
    id: url
    attributes:
      label: URL
      description: Link to the affected page.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the broken behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: false
