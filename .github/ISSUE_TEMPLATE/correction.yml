name: Correction
description: Report a factual error, typo, or needed correction.
title: "Correction: "
labels:
  - correction
body:
  - type: markdown
    attributes:
      value: Thanks for helping keep TheGitReporter accurate.
  - type: input
    id: page
    attributes:
      label: Page or article
      description: Link to the page, article, or evidence trail.
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: What should be corrected?
      description: Explain the issue and the proposed correction.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Add public sources that support the correction.
    validations:
      required: false
