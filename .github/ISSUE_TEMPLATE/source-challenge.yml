name: Source challenge
description: Challenge an article claim, source interpretation, or evidence trail.
title: "Source challenge: "
labels:
  - source challenge
body:
  - type: input
    id: page
    attributes:
      label: Page or claim
      description: Link to the article, evidence page, or exact claim.
    validations:
      required: true
  - type: textarea
    id: challenge
    attributes:
      label: What is being challenged?
      description: Identify the claim, interpretation, or source trail concern.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Counter-evidence or context
      description: Add public links, commits, PRs, issues, docs, or other sources.
    validations:
      required: true
