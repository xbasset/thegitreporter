<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">From Clawd automation to a living newspaper</title>
  <desc id="desc">A three-panel diagram showing automation, failures, and a static newspaper with public evidence.</desc>
  <rect width="1600" height="900" fill="#f4ead8"/>
  <path d="M60 80h1480v740H60z" fill="#fff9ee" stroke="#171717" stroke-width="8"/>
  <path d="M78 102h1444" stroke="#171717" stroke-width="3" stroke-dasharray="18 12"/>
  <text x="95" y="60" font-family="Georgia, serif" font-size="42" fill="#171717">THE GIT REPORTER DEVELOPMENT TRACE</text>
  <text x="1130" y="60" font-family="Arial, sans-serif" font-size="22" fill="#171717">HOST EVIDENCE / PUBLIC EXPORT</text>

  <g transform="translate(95 130)">
    <rect width="430" height="630" fill="#fdf3df" stroke="#171717" stroke-width="5"/>
    <rect x="18" y="20" width="394" height="58" fill="#1f5c8a" stroke="#171717" stroke-width="4"/>
    <text x="36" y="58" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#fff9ee">CLAWD AUTOMATION</text>
    <circle cx="88" cy="150" r="46" fill="#fff9ee" stroke="#171717" stroke-width="5"/>
    <path d="M88 118v34l24 18" fill="none" stroke="#171717" stroke-width="6" stroke-linecap="round"/>
    <text x="155" y="146" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#171717">06:00 DAILY</text>
    <text x="155" y="178" font-family="Arial, sans-serif" font-size="19" fill="#171717">scan / evidence / article</text>
    <circle cx="88" cy="255" r="46" fill="#fff9ee" stroke="#171717" stroke-width="5"/>
    <path d="M88 223v34l22 20" fill="none" stroke="#171717" stroke-width="6" stroke-linecap="round"/>
    <text x="155" y="251" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#171717">06:10 AGENT-DAILY</text>
    <text x="155" y="283" font-family="Arial, sans-serif" font-size="19" fill="#171717">cross-repo pattern lane</text>
    <rect x="34" y="350" width="360" height="98" fill="#fff9ee" stroke="#171717" stroke-width="4"/>
    <text x="55" y="386" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#171717">TRUTH FROM CODE</text>
    <text x="55" y="420" font-family="Arial, sans-serif" font-size="20" fill="#171717">git + gh + gsio + notes</text>
    <rect x="34" y="482" width="360" height="92" fill="#e7f0df" stroke="#171717" stroke-width="4"/>
    <text x="55" y="518" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#171717">PUBLISH LOCAL LINK</text>
    <text x="55" y="550" font-family="Arial, sans-serif" font-size="19" fill="#171717">HTML + state + trail log</text>
  </g>

  <g transform="translate(585 130)">
    <rect width="430" height="630" fill="#fff3f1" stroke="#171717" stroke-width="5"/>
    <rect x="18" y="20" width="394" height="58" fill="#b84037" stroke="#171717" stroke-width="4"/>
    <text x="36" y="58" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#fff9ee">FAILURE LEDGER</text>
    <g transform="translate(48 120) rotate(-3)">
      <rect width="330" height="88" fill="#fff9ee" stroke="#171717" stroke-width="4"/>
      <text x="24" y="38" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#171717">MISSING TOOL</text>
      <text x="24" y="68" font-family="Arial, sans-serif" font-size="20" fill="#171717">gsio command not found</text>
    </g>
    <g transform="translate(50 250) rotate(2)">
      <rect width="330" height="88" fill="#fff9ee" stroke="#171717" stroke-width="4"/>
      <text x="24" y="38" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#171717">FETCH FAILED</text>
      <text x="24" y="68" font-family="Arial, sans-serif" font-size="20" fill="#171717">network request collapsed</text>
    </g>
    <g transform="translate(48 380) rotate(-2)">
      <rect width="330" height="88" fill="#fff9ee" stroke="#171717" stroke-width="4"/>
      <text x="24" y="38" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#171717">OAUTH REFRESH FAILED</text>
      <text x="24" y="68" font-family="Arial, sans-serif" font-size="20" fill="#171717">cron cannot publish alone</text>
    </g>
    <path d="M95 535c65-50 145 50 230 0" fill="none" stroke="#171717" stroke-width="8" stroke-linecap="round"/>
    <path d="M205 515l35 40M242 515l-35 40" stroke="#b84037" stroke-width="7" stroke-linecap="round"/>
  </g>

  <g transform="translate(1075 130)">
    <rect width="430" height="630" fill="#edf5f7" stroke="#171717" stroke-width="5"/>
    <rect x="18" y="20" width="394" height="58" fill="#2c6c5b" stroke="#171717" stroke-width="4"/>
    <text x="36" y="58" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#fff9ee">LIVING NEWSPAPER</text>
    <rect x="44" y="112" width="340" height="210" fill="#fff9ee" stroke="#171717" stroke-width="5"/>
    <text x="72" y="156" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#171717">LATEST EDITION</text>
    <path d="M72 184h280M72 214h240M72 244h268M72 274h180" stroke="#171717" stroke-width="5"/>
    <rect x="54" y="354" width="150" height="118" fill="#fdf3df" stroke="#171717" stroke-width="4"/>
    <text x="75" y="392" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#171717">PRIVATE</text>
    <text x="75" y="424" font-family="Arial, sans-serif" font-size="18" fill="#171717">notes</text>
    <text x="75" y="452" font-family="Arial, sans-serif" font-size="18" fill="#171717">cache</text>
    <path d="M210 413h64" stroke="#171717" stroke-width="6" marker-end="url(#arrow)"/>
    <rect x="276" y="354" width="118" height="118" fill="#e7f0df" stroke="#171717" stroke-width="4"/>
    <text x="296" y="392" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#171717">PUBLIC</text>
    <text x="296" y="424" font-family="Arial, sans-serif" font-size="18" fill="#171717">HTML</text>
    <text x="296" y="452" font-family="Arial, sans-serif" font-size="18" fill="#171717">evidence</text>
    <rect x="54" y="516" width="340" height="62" fill="#fff9ee" stroke="#171717" stroke-width="4"/>
    <text x="77" y="556" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#171717">THEGITREPORTER.COM</text>
  </g>

  <path d="M532 445h42" stroke="#171717" stroke-width="8" marker-end="url(#arrow)"/>
  <path d="M1022 445h42" stroke="#171717" stroke-width="8" marker-end="url(#arrow)"/>
  <rect x="410" y="790" width="780" height="52" fill="#fff9ee" stroke="#171717" stroke-width="4"/>
  <text x="440" y="825" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#171717">THE AUTOMATION FOUND THE PRODUCT. THE FAILURES FOUND THE ARCHITECTURE.</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#171717"/>
    </marker>
  </defs>
</svg>
