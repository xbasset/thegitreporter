<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How AI Agents Work - Chapter 0: Reference architecture</title>
  <desc id="desc">A reference flow shows an operator goal entering a session and context compiler, a model proposing actions, a runtime orchestrator and policy layer authorizing tools, and a bound executor producing effects in an environment.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11Z" fill="#1b1a16"/>
    </marker>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#c3bbab" stroke-width="4"/>
    </pattern>
  </defs>
  <rect width="1200" height="680" fill="#f7f3e8"/>
  <line x1="42" y1="78" x2="1158" y2="78" stroke="#1b1a16" stroke-width="3"/>
  <text x="42" y="48" font-family="SFMono-Regular, Consolas, monospace" font-size="24" font-weight="800" fill="#2e6231">RUNTIME DIAGRAM 00</text>
  <text x="1158" y="48" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace" font-size="19" font-weight="800" fill="#8b441c">REFERENCE</text>
  <rect x="300" y="115" width="858" height="135" fill="#e2eadc" stroke="#b8b09f" stroke-width="2"/>
  <rect x="300" y="275" width="858" height="150" fill="#eee6d2" stroke="#b8b09f" stroke-width="2"/>
  <rect x="300" y="450" width="858" height="160" fill="#e7e3da" stroke="#b8b09f" stroke-width="2"/>
  <text x="320" y="145" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#8b441c">MODEL-VISIBLE</text>
  <text x="320" y="300" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#8b441c">RUNTIME-VISIBLE</text>
  <text x="320" y="480" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#8b441c">ENVIRONMENT-ENFORCED</text>
  <g>
    <rect x="42" y="165" width="200" height="360" fill="#dce8eb" stroke="#1b1a16" stroke-width="3"/>
    <text x="60" y="185" font-family="SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#8b441c">OPERATOR</text>
    <text x="142" y="287.3" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="900" fill="#10100d">
    <tspan x="142" dy="0">Human</tspan>
    <tspan x="142" dy="29">principal</tspan>
  </text>
    <text x="142" y="414.7" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="17" font-weight="700" fill="#6c665a">
    <tspan x="142" dy="0">goal, scope,</tspan>
    <tspan x="142" dy="19">approval</tspan>
  </text>
  </g>
  <g>
    <rect x="590" y="145" width="300" height="90" fill="#e2eadc" stroke="#1b1a16" stroke-width="3"/>
    <text x="604" y="165" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">MODEL</text>
    <text x="740" y="185" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="740" dy="0">Model invocation</tspan>
  </text>
    <text x="740" y="217" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="740" dy="0">probabilistic proposal</tspan>
  </text>
  </g>
  <g>
    <rect x="320" y="310" width="190" height="110" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="334" y="330" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="415" y="351" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="415" dy="0">Context</tspan>
    <tspan x="415" dy="22">compiler</tspan>
  </text>
    <text x="415" y="404" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="415" dy="0">assemble context</tspan>
  </text>
  </g>
  <g>
    <rect x="525" y="310" width="190" height="110" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="539" y="330" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="620" y="362" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="620" dy="0">Orchestrator</tspan>
  </text>
    <text x="620" y="396" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="620" dy="0">workflow, policy,</tspan>
    <tspan x="620" dy="16">budgets</tspan>
  </text>
  </g>
  <g>
    <rect x="730" y="310" width="190" height="110" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="744" y="330" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="825" y="362" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="825" dy="0">Tool broker</tspan>
  </text>
    <text x="825" y="396" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="825" dy="0">validate /</tspan>
    <tspan x="825" dy="16">authorize</tspan>
  </text>
  </g>
  <g>
    <rect x="935" y="310" width="190" height="110" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="949" y="330" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="1030" y="351" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="1030" dy="0">Bound</tspan>
    <tspan x="1030" dy="22">executor</tspan>
  </text>
    <text x="1030" y="396" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="1030" dy="0">invoke selected</tspan>
    <tspan x="1030" dy="16">principal</tspan>
  </text>
  </g>
  <g>
    <rect x="535" y="500" width="410" height="90" fill="#e7e3da" stroke="#1b1a16" stroke-width="3"/>
    <text x="549" y="520" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">ENVIRONMENT</text>
    <text x="740" y="540" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="740" dy="0">Environment effect</tspan>
  </text>
    <text x="740" y="572" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="740" dy="0">accept, reject, persist</tspan>
  </text>
  </g>
  <path d="M242 280L320 365" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M510 365L690 235" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M750 235L620 310" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M715 365L730 365" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M920 365L935 365" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1030 420L945 545" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M535 545L420 420" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)" stroke-dasharray="10 10"/>
  <text x="450" y="445" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="800" fill="#2e6231">RESULT + EVIDENCE</text>
  <text x="65" y="145" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#8b441c">OPERATOR-VISIBLE</text>
</svg>
