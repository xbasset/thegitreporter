<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How AI Agents Work - Chapter 8: The human control loop</title>
  <desc id="desc">A closed supervisory loop moves from runtime state to evidence, human judgment, and a control action that changes the runtime.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11Z" fill="#1b1a16"/>
    </marker>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#c3bbab" stroke-width="4"/>
    </pattern>
  </defs>
  <rect width="1200" height="680" fill="#f7f3e8"/>
  <line x1="42" y1="78" x2="1158" y2="78" stroke="#1b1a16" stroke-width="3"/>
  <text x="42" y="48" font-family="SFMono-Regular, Consolas, monospace" font-size="24" font-weight="800" fill="#2e6231">RUNTIME DIAGRAM 08</text>
  <text x="1158" y="48" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace" font-size="19" font-weight="800" fill="#8b441c">FEEDBACK</text>
  <g>
    <rect x="120" y="150" width="280" height="145" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="138" y="170" font-family="SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="260" y="205.1" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="900" fill="#10100d">
    <tspan x="260" dy="0">Runtime state</tspan>
  </text>
    <text x="260" y="244.89999999999998" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="17" font-weight="700" fill="#6c665a">
    <tspan x="260" dy="0">active sessions and</tspan>
    <tspan x="260" dy="19">work</tspan>
  </text>
  </g>
  <g>
    <rect x="800" y="150" width="280" height="145" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="818" y="170" font-family="SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="940" y="190.6" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="900" fill="#10100d">
    <tspan x="940" dy="0">Evidence</tspan>
    <tspan x="940" dy="29">surface</tspan>
  </text>
    <text x="940" y="244.89999999999998" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="17" font-weight="700" fill="#6c665a">
    <tspan x="940" dy="0">status, trace, diff,</tspan>
    <tspan x="940" dy="19">prompt</tspan>
  </text>
  </g>
  <g>
    <rect x="800" y="450" width="280" height="145" fill="#dce8eb" stroke="#1b1a16" stroke-width="3"/>
    <text x="818" y="470" font-family="SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#8b441c">OPERATOR</text>
    <text x="940" y="505.1" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="900" fill="#10100d">
    <tspan x="940" dy="0">Human judgment</tspan>
  </text>
    <text x="940" y="544.9" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="17" font-weight="700" fill="#6c665a">
    <tspan x="940" dy="0">compare progress with</tspan>
    <tspan x="940" dy="19">intent</tspan>
  </text>
  </g>
  <g>
    <rect x="120" y="450" width="280" height="145" fill="#dce8eb" stroke="#1b1a16" stroke-width="3"/>
    <text x="138" y="470" font-family="SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#8b441c">OPERATOR</text>
    <text x="260" y="505.1" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="900" fill="#10100d">
    <tspan x="260" dy="0">Control action</tspan>
  </text>
    <text x="260" y="544.9" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="17" font-weight="700" fill="#6c665a">
    <tspan x="260" dy="0">steer, stop, switch,</tspan>
    <tspan x="260" dy="19">rewind</tspan>
  </text>
  </g>
  <path d="M400 222L800 222" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M940 295L940 450" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M800 522L400 522" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M260 450L260 295" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="600" y="350" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="900" fill="#10100d">SUPERVISORY LOOP</text>
</svg>
