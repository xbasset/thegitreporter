<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 880" role="img" aria-labelledby="title desc">
  <title id="title">How AI Agents Work - Chapter 5: Delegation control plane</title>
  <desc id="desc">A parent run scopes three child workers with separate identities and authority, then verifies lineage, freshness, and results before merging.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11Z" fill="#1b1a16"/>
    </marker>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#c3bbab" stroke-width="4"/>
    </pattern>
  </defs>
  <rect width="360" height="880" fill="#f7f3e8"/>
  <line x1="18" y1="62" x2="342" y2="62" stroke="#1b1a16" stroke-width="2"/>
  <text x="18" y="38" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#2e6231">RUNTIME DIAGRAM 05</text>
  <text x="342" y="38" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#8b441c">TREE</text>
  <g>
    <rect x="70" y="95" width="220" height="105" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="84" y="111" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="137" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Parent run</tspan>
  </text>
    <text x="180" y="164.5" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">goal, topology,</tspan>
    <tspan x="180" dy="17">authority</tspan>
  </text>
  </g>
    <path d="M180 200H20V620" fill="none" stroke="#1b1a16" stroke-width="2"/>
    <path d="M20 310L60 310" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M20 450L60 450" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M20 590L60 590" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
    <g>
    <rect x="60" y="260" width="240" height="100" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="74" y="276" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="302" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Child A</tspan>
  </text>
    <text x="180" y="329.5" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">scoped task and</tspan>
    <tspan x="180" dy="17">context</tspan>
  </text>
  </g>
<g>
    <rect x="60" y="400" width="240" height="100" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="74" y="416" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="442" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Child B</tspan>
  </text>
    <text x="180" y="478" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">separate lifecycle</tspan>
  </text>
  </g>
<g>
    <rect x="60" y="540" width="240" height="100" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="74" y="556" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="582" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Child C</tspan>
  </text>
    <text x="180" y="618" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">correlated events</tspan>
  </text>
  </g>
    <path d="M300 310L340 310" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M300 450L340 450" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M300 590L340 590" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M340 310V690H180V730" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
    <g>
    <rect x="70" y="735" width="220" height="110" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="84" y="751" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="777" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Verify and merge</tspan>
  </text>
    <text x="180" y="804.5" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">lineage, freshness,</tspan>
    <tspan x="180" dy="17">result</tspan>
  </text>
  </g>
</svg>
