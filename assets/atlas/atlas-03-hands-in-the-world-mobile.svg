<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1130" role="img" aria-labelledby="title desc">
  <title id="title">How AI Agents Work - Chapter 3: From model proposal to external effect</title>
  <desc id="desc">A swimlane transaction moves a proposed tool call from the model through runtime validation, policy, an optional operator decision, authorization, a bound executor, the environment effect, and a typed receipt.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11Z" fill="#1b1a16"/>
    </marker>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#c3bbab" stroke-width="4"/>
    </pattern>
  </defs>
  <rect width="360" height="1130" fill="#f7f3e8"/>
  <line x1="18" y1="62" x2="342" y2="62" stroke="#1b1a16" stroke-width="2"/>
  <text x="18" y="38" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#2e6231">RUNTIME DIAGRAM 03</text>
  <text x="342" y="38" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#8b441c">TRANSACTION</text>
  <path d="M180 196L180 216" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M180 324L180 344" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M180 452L180 472" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6 6"/>
<path d="M180 580L180 600" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6 6"/>
<path d="M180 708L180 728" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M180 836L180 856" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M180 964L180 984" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>


<path d="M336 400H350V656H336" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>



<g>
    <rect x="24" y="92" width="312" height="104" fill="#e2eadc" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="108" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">MODEL</text>
    <text x="180" y="134" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Propose call</tspan>
  </text>
    <text x="180" y="170" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">name plus arguments</tspan>
  </text>
  </g>
<g>
    <rect x="24" y="220" width="312" height="104" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="236" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="262" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Validate</tspan>
  </text>
    <text x="180" y="298" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">schema and registration</tspan>
  </text>
  </g>
<g>
    <rect x="24" y="348" width="312" height="104" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="364" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="390" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Check policy</tspan>
  </text>
    <text x="180" y="426" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">grants and limits</tspan>
  </text>
  </g>
<g>
    <rect x="24" y="476" width="312" height="104" fill="#dce8eb" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="492" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">OPERATOR</text>
    <text x="180" y="518" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Operator decision</tspan>
  </text>
    <text x="180" y="554" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">only when required</tspan>
  </text>
  </g>
<g>
    <rect x="24" y="604" width="312" height="104" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="620" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="646" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Authorize</tspan>
  </text>
    <text x="180" y="682" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">policy + any consent</tspan>
  </text>
  </g>
<g>
    <rect x="24" y="732" width="312" height="104" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="748" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="774" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Bound executor</tspan>
  </text>
    <text x="180" y="810" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">selected principal</tspan>
  </text>
  </g>
<g>
    <rect x="24" y="860" width="312" height="104" fill="#e7e3da" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="876" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">ENVIRONMENT</text>
    <text x="180" y="902" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Environment effect</tspan>
  </text>
    <text x="180" y="938" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">commit or reject</tspan>
  </text>
  </g>
<g>
    <rect x="24" y="988" width="312" height="104" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="1004" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="1030" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Record receipt</tspan>
  </text>
    <text x="180" y="1066" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">result + evidence</tspan>
  </text>
  </g>
</svg>
