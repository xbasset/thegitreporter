<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 735" role="img" aria-labelledby="title desc">
  <title id="title">How AI Agents Work - Chapter 10: Three futures from the same runtime plumbing</title>
  <desc id="desc">Three parallel scenario panels compare supervised agent organizations, governed capability markets, and managed but opaque runtime stacks.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11Z" fill="#1b1a16"/>
    </marker>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#c3bbab" stroke-width="4"/>
    </pattern>
  </defs>
  <rect width="360" height="735" fill="#f7f3e8"/>
  <line x1="18" y1="62" x2="342" y2="62" stroke="#1b1a16" stroke-width="2"/>
  <text x="18" y="38" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#2e6231">RUNTIME DIAGRAM 10</text>
  <text x="342" y="38" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#8b441c">SCENARIOS</text>
  <g>
    <rect x="50" y="95" width="260" height="110" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="64" y="111" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="137" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Present signals</tspan>
  </text>
    <text x="180" y="164.5" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">tools / policy /</tspan>
    <tspan x="180" dy="17">correlated events</tspan>
  </text>
  </g>
    <path d="M50 150H12V630" fill="none" stroke="#1b1a16" stroke-width="2"/>
    <path d="M12 320L24 320" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M12 475L24 475" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M12 630L24 630" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
    <g>
    <rect x="24" y="265" width="312" height="110" fill="#dce8eb" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="281" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">OPERATOR</text>
    <text x="180" y="307" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Supervised organizations</tspan>
  </text>
    <text x="180" y="334.5" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">accountable workers and</tspan>
    <tspan x="180" dy="17">recoverable work</tspan>
  </text>
  </g>
<g>
    <rect x="24" y="420" width="312" height="110" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="436" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="452" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Governed capability</tspan>
    <tspan x="180" dy="20">markets</tspan>
  </text>
    <text x="180" y="489.5" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">inspectable discovery and</tspan>
    <tspan x="180" dy="17">activation</tspan>
  </text>
  </g>
<g>
    <rect x="24" y="575" width="312" height="110" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="591" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="617" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Managed opaque stacks</tspan>
  </text>
    <text x="180" y="644.5" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">stronger control, weaker local</tspan>
    <tspan x="180" dy="17">audit</tspan>
  </text>
  </g>
</svg>
