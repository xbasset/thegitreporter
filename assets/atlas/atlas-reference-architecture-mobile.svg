<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 875" role="img" aria-labelledby="title desc">
  <title id="title">How AI Agents Work - Chapter 0: Reference architecture</title>
  <desc id="desc">A reference flow shows an operator goal entering a session and context compiler, a model proposing actions, a runtime orchestrator and policy layer authorizing tools, and a bound executor producing effects in an environment.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11Z" fill="#1b1a16"/>
    </marker>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#c3bbab" stroke-width="4"/>
    </pattern>
  </defs>
  <rect width="360" height="875" fill="#f7f3e8"/>
  <line x1="18" y1="62" x2="342" y2="62" stroke="#1b1a16" stroke-width="2"/>
  <text x="18" y="38" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#2e6231">RUNTIME DIAGRAM 00</text>
  <text x="342" y="38" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#8b441c">REFERENCE</text>
  <g>
    <rect x="24" y="95" width="312" height="105" fill="#e2eadc" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="111" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">MODEL</text>
    <text x="180" y="137" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Model invocation</tspan>
  </text>
    <text x="180" y="173" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">probabilistic proposal</tspan>
  </text>
  </g>
    <g>
    <rect x="24" y="250" width="312" height="100" fill="#dce8eb" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="266" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">OPERATOR</text>
    <text x="180" y="292" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Human principal</tspan>
  </text>
    <text x="180" y="328" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">goal, scope, approval</tspan>
  </text>
  </g>
    <g>
    <rect x="24" y="400" width="312" height="110" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="416" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="442" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Runtime control</tspan>
  </text>
    <text x="180" y="469.5" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">context / workflow /</tspan>
    <tspan x="180" dy="17">authorization</tspan>
  </text>
  </g>
    <g>
    <rect x="24" y="575" width="312" height="105" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="591" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="617" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Bound executor</tspan>
  </text>
    <text x="180" y="653" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">invoke selected principal</tspan>
  </text>
  </g>
    <g>
    <rect x="24" y="745" width="312" height="105" fill="#e7e3da" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="761" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">ENVIRONMENT</text>
    <text x="180" y="787" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Environment effect</tspan>
  </text>
    <text x="180" y="823" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">accept, reject, persist</tspan>
  </text>
  </g>
    <path d="M336 147H350V455H336" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M24 455H10V147H24" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M176 350L176 400" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M176 510L176 575" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M176 680L176 745" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M24 797H6V455H24" fill="none" stroke="#1b1a16" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
</svg>
