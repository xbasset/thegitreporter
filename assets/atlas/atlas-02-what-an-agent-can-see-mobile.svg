<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 950" role="img" aria-labelledby="title desc">
  <title id="title">How AI Agents Work - Chapter 2: What reaches the model</title>
  <desc id="desc">Multiple context sources converge on a runtime context compiler, which selects a model-visible viewport while leaving stale, missing, or blocked material outside.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11Z" fill="#1b1a16"/>
    </marker>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#c3bbab" stroke-width="4"/>
    </pattern>
  </defs>
  <rect width="360" height="950" fill="#f7f3e8"/>
  <line x1="18" y1="62" x2="342" y2="62" stroke="#1b1a16" stroke-width="2"/>
  <text x="18" y="38" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#2e6231">RUNTIME DIAGRAM 02</text>
  <text x="342" y="38" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#8b441c">APERTURE</text>
  <g>
    <rect x="20" y="90" width="250" height="100" fill="#dce8eb" stroke="#1b1a16" stroke-width="2"/>
    <text x="34" y="106" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">OPERATOR</text>
    <text x="145" y="132" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="145" dy="0">Visible thread</tspan>
  </text>
    <text x="145" y="159.5" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="145" dy="0">messages and displayed</tspan>
    <tspan x="145" dy="17">history</tspan>
  </text>
  </g>
<g>
    <rect x="20" y="210" width="250" height="100" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="34" y="226" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="145" y="252" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="145" dy="0">Hidden context</tspan>
  </text>
    <text x="145" y="279.5" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="145" dy="0">application and</tspan>
    <tspan x="145" dy="17">untrusted state</tspan>
  </text>
  </g>
<g>
    <rect x="20" y="330" width="250" height="100" fill="#e7e3da" stroke="#1b1a16" stroke-width="2"/>
    <text x="34" y="346" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">ENVIRONMENT</text>
    <text x="145" y="372" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="145" dy="0">Memory and files</tspan>
  </text>
    <text x="145" y="399.5" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="145" dy="0">retrieval plus path</tspan>
    <tspan x="145" dy="17">rules</tspan>
  </text>
  </g>
    <path d="M270 140H300V380" fill="none" stroke="#1b1a16" stroke-width="2"/>
    <path d="M270 260H300" fill="none" stroke="#1b1a16" stroke-width="2"/>
    <path d="M270 380H300" fill="none" stroke="#1b1a16" stroke-width="2"/>
    <path d="M300 380V445H180V470" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
    <g>
    <rect x="45" y="470" width="270" height="115" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="59" y="486" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="512" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Context compiler</tspan>
  </text>
    <text x="180" y="548" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">rank, budget, serialize</tspan>
  </text>
  </g>
    <path d="M180 585L180 665" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M315 527H346V870H340" fill="none" stroke="#1b1a16" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
    <g>
    <rect x="20" y="670" width="320" height="105" fill="#e2eadc" stroke="#1b1a16" stroke-width="2"/>
    <text x="34" y="686" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">MODEL</text>
    <text x="180" y="712" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Model viewport</tspan>
  </text>
    <text x="180" y="748" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">selected packets</tspan>
  </text>
  </g>
    <rect x="12" y="805" width="336" height="125" fill="url(#hatch)" stroke="#1b1a16" stroke-width="2"/>
    <g>
    <rect x="20" y="815" width="320" height="105" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="34" y="831" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="857" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Outside model input</tspan>
  </text>
    <text x="180" y="893" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">omitted / stale / unavailable</tspan>
  </text>
  </g>
</svg>
