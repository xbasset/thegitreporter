<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How AI Agents Work - Chapter 6: Memory is a stack of contracts</title>
  <desc id="desc">Five nested storage layers move from short-lived high-fidelity turn context to durable records with increasing persistence and distortion risk.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11Z" fill="#1b1a16"/>
    </marker>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#c3bbab" stroke-width="4"/>
    </pattern>
  </defs>
  <rect width="1200" height="680" fill="#f7f3e8"/>
  <line x1="42" y1="78" x2="1158" y2="78" stroke="#1b1a16" stroke-width="3"/>
  <text x="42" y="48" font-family="SFMono-Regular, Consolas, monospace" font-size="24" font-weight="800" fill="#2e6231">RUNTIME DIAGRAM 06</text>
  <text x="1158" y="48" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace" font-size="19" font-weight="800" fill="#8b441c">LAYERS</text>
  <text x="42" y="128" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">SHORT-LIVED / HIGH-FIDELITY</text>
  <text x="1158" y="128" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">LONG-LIVED / COSTLY TO CORRECT</text>
  <g>
    <rect x="140" y="145" width="920" height="92" fill="#e2eadc" stroke="#1b1a16" stroke-width="3"/>
    <text x="154" y="165" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">MODEL</text>
    <text x="600" y="185" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="600" dy="0">Turn context</tspan>
  </text>
    <text x="600" y="217" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="600" dy="0">selected, short-lived, high fidelity</tspan>
  </text>
  </g>
<g>
    <rect x="195" y="243" width="810" height="92" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="209" y="263" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="600" y="283" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="600" dy="0">Thread history</tspan>
  </text>
    <text x="600" y="315" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="600" dy="0">durable conversational record</tspan>
  </text>
  </g>
<g>
    <rect x="250" y="341" width="700" height="92" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="264" y="361" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="600" y="381" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="600" dy="0">Notes and memories</tspan>
  </text>
    <text x="600" y="413" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="600" dy="0">typed writes with provenance</tspan>
  </text>
  </g>
<g>
    <rect x="305" y="439" width="590" height="92" fill="#e7e3da" stroke="#1b1a16" stroke-width="3"/>
    <text x="319" y="459" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">ENVIRONMENT</text>
    <text x="600" y="479" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="600" dy="0">Indexes and caches</tspan>
  </text>
    <text x="600" y="511" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="600" dy="0">derived and rebuildable</tspan>
  </text>
  </g>
<g>
    <rect x="360" y="537" width="480" height="92" fill="#e7e3da" stroke="#1b1a16" stroke-width="3"/>
    <text x="374" y="557" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">ENVIRONMENT</text>
    <text x="600" y="577" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="600" dy="0">Archive and audit</tspan>
  </text>
    <text x="600" y="609" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="600" dy="0">long-lived, costly to correct</tspan>
  </text>
  </g>
  <path d="M90 170V590" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="68" y="390" text-anchor="middle" transform="rotate(-90 68 390)" font-family="SFMono-Regular, Consolas, monospace" font-size="17" font-weight="800" fill="#2e6231">PERSISTENCE / DISTORTION RISK</text>
</svg>
