<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How AI Agents Work - Chapter 4: Workflow edges around a model loop</title>
  <desc id="desc">A recovery workflow shows load, model proposal, policy gate, bound execution, and an environment effect branching into either an observed outcome or an unknown outcome that must be reconciled before retry.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11Z" fill="#1b1a16"/>
    </marker>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#c3bbab" stroke-width="4"/>
    </pattern>
  </defs>
  <rect width="1200" height="680" fill="#f7f3e8"/>
  <line x1="42" y1="78" x2="1158" y2="78" stroke="#1b1a16" stroke-width="3"/>
  <text x="42" y="48" font-family="SFMono-Regular, Consolas, monospace" font-size="24" font-weight="800" fill="#2e6231">RUNTIME DIAGRAM 04</text>
  <text x="1158" y="48" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace" font-size="19" font-weight="800" fill="#8b441c">RECOVERY</text>
  <path d="M242 180L270 180" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
<path d="M470 180L498 180" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
<path d="M698 180L726 180" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
<path d="M926 180L954 180" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1054 235L275 400" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1054 235L625 400" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)" stroke-dasharray="10 10"/>
  <path d="M750 460L830 460" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M150 460H20V180H42" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M950 520V625H142V235" fill="none" stroke="#1b1a16" stroke-width="3" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
  <text x="610" y="345" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="800" fill="#2e6231">KNOWN RESULT</text>
  <text x="895" y="340" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="800" fill="#8b441c">NO RESULT / EFFECT MAY EXIST</text>
  <g>
    <rect x="42" y="125" width="200" height="110" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="56" y="145" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="142" y="166" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="142" dy="0">Load run</tspan>
    <tspan x="142" dy="22">state</tspan>
  </text>
    <text x="142" y="211" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="142" dy="0">identity, queue,</tspan>
    <tspan x="142" dy="16">budgets</tspan>
  </text>
  </g>
<g>
    <rect x="270" y="125" width="200" height="110" fill="#e2eadc" stroke="#1b1a16" stroke-width="3"/>
    <text x="284" y="145" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">MODEL</text>
    <text x="370" y="166" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="370" dy="0">Propose</tspan>
    <tspan x="370" dy="22">action</tspan>
  </text>
    <text x="370" y="211" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="370" dy="0">probabilistic next</tspan>
    <tspan x="370" dy="16">step</tspan>
  </text>
  </g>
<g>
    <rect x="498" y="125" width="200" height="110" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="512" y="145" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="598" y="166" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="598" dy="0">Gate</tspan>
    <tspan x="598" dy="22">transition</tspan>
  </text>
    <text x="598" y="211" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="598" dy="0">authorize, block,</tspan>
    <tspan x="598" dy="16">pause</tspan>
  </text>
  </g>
<g>
    <rect x="726" y="125" width="200" height="110" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="740" y="145" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="826" y="166" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="826" dy="0">Bound</tspan>
    <tspan x="826" dy="22">executor</tspan>
  </text>
    <text x="826" y="211" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="826" dy="0">invoke selected</tspan>
    <tspan x="826" dy="16">principal</tspan>
  </text>
  </g>
<g>
    <rect x="954" y="125" width="200" height="110" fill="#e7e3da" stroke="#1b1a16" stroke-width="3"/>
    <text x="968" y="145" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">ENVIRONMENT</text>
    <text x="1054" y="166" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="1054" dy="0">Environment</tspan>
    <tspan x="1054" dy="22">effect</tspan>
  </text>
    <text x="1054" y="211" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="1054" dy="0">may commit before</tspan>
    <tspan x="1054" dy="16">reply</tspan>
  </text>
  </g>
  <g>
    <rect x="150" y="400" width="250" height="120" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="164" y="420" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="275" y="452" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="275" dy="0">Observed outcome</tspan>
  </text>
    <text x="275" y="494" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="275" dy="0">known success or failure</tspan>
  </text>
  </g>
  <g>
    <rect x="500" y="400" width="250" height="120" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="514" y="420" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="625" y="452" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="625" dy="0">Unknown outcome</tspan>
  </text>
    <text x="625" y="494" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="625" dy="0">effect may exist</tspan>
  </text>
  </g>
  <g>
    <rect x="830" y="400" width="240" height="120" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="844" y="420" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="950" y="441" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="950" dy="0">Reconcile before</tspan>
    <tspan x="950" dy="22">retry</tspan>
  </text>
    <text x="950" y="486" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="950" dy="0">lookup, dedupe,</tspan>
    <tspan x="950" dy="16">compensate</tspan>
  </text>
  </g>
</svg>
