<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How AI Agents Work - Chapter 2: What reaches the model</title>
  <desc id="desc">Multiple context sources converge on a runtime context compiler, which selects a model-visible viewport while leaving stale, missing, or blocked material outside.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11Z" fill="#1b1a16"/>
    </marker>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#c3bbab" stroke-width="4"/>
    </pattern>
  </defs>
  <rect width="1200" height="680" fill="#f7f3e8"/>
  <line x1="42" y1="78" x2="1158" y2="78" stroke="#1b1a16" stroke-width="3"/>
  <text x="42" y="48" font-family="SFMono-Regular, Consolas, monospace" font-size="24" font-weight="800" fill="#2e6231">RUNTIME DIAGRAM 02</text>
  <text x="1158" y="48" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace" font-size="19" font-weight="800" fill="#8b441c">APERTURE</text>
  <g>
    <rect x="42" y="130" width="250" height="120" fill="#dce8eb" stroke="#1b1a16" stroke-width="3"/>
    <text x="56" y="150" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">OPERATOR</text>
    <text x="167" y="182" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="167" dy="0">Visible thread</tspan>
  </text>
    <text x="167" y="216" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="167" dy="0">messages and displayed</tspan>
    <tspan x="167" dy="16">history</tspan>
  </text>
  </g>
<g>
    <rect x="42" y="290" width="250" height="120" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="56" y="310" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="167" y="342" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="167" dy="0">Hidden context</tspan>
  </text>
    <text x="167" y="376" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="167" dy="0">application and untrusted</tspan>
    <tspan x="167" dy="16">state</tspan>
  </text>
  </g>
<g>
    <rect x="42" y="450" width="250" height="120" fill="#e7e3da" stroke="#1b1a16" stroke-width="3"/>
    <text x="56" y="470" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">ENVIRONMENT</text>
    <text x="167" y="502" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="167" dy="0">Memory and files</tspan>
  </text>
    <text x="167" y="544" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="167" dy="0">retrieval plus path rules</tspan>
  </text>
  </g>
  <path d="M292 190L430 300" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
<path d="M292 350L430 300" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
<path d="M292 510L430 300" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
  <g>
    <rect x="430" y="210" width="280" height="180" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="448" y="230" font-family="SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="570" y="263.9" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="900" fill="#10100d">
    <tspan x="570" dy="0">Context</tspan>
    <tspan x="570" dy="29">compiler</tspan>
  </text>
    <text x="570" y="339.6" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="17" font-weight="700" fill="#6c665a">
    <tspan x="570" dy="0">rank, budget, serialize</tspan>
  </text>
  </g>
  <path d="M710 300L835 220" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M710 330L835 500" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)" stroke-dasharray="10 10"/>
  <g>
    <rect x="835" y="125" width="323" height="190" fill="#e2eadc" stroke="#1b1a16" stroke-width="3"/>
    <text x="853" y="145" font-family="SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#8b441c">MODEL</text>
    <text x="996.5" y="197.2" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="900" fill="#10100d">
    <tspan x="996.5" dy="0">Model viewport</tspan>
  </text>
    <text x="996.5" y="261.79999999999995" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="17" font-weight="700" fill="#6c665a">
    <tspan x="996.5" dy="0">selected packets</tspan>
  </text>
  </g>
  <rect x="835" y="405" width="323" height="160" fill="url(#hatch)" stroke="#1b1a16" stroke-width="3"/>
  <g>
    <rect x="850" y="420" width="293" height="130" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="864" y="440" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="996.5" y="472" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="996.5" dy="0">Outside model input</tspan>
  </text>
    <text x="996.5" y="514" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="996.5" dy="0">omitted / stale / unavailable</tspan>
  </text>
  </g>
</svg>
