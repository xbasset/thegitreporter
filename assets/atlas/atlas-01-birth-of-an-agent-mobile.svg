<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 964" role="img" aria-labelledby="title desc">
  <title id="title">How AI Agents Work - Chapter 1: Before the first model request</title>
  <desc id="desc">A six-step flow shows thread restoration, tool-mode resolution, pending input, prompt hooks, policy decisions, and the assembled model request.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11Z" fill="#1b1a16"/>
    </marker>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#c3bbab" stroke-width="4"/>
    </pattern>
  </defs>
  <rect width="360" height="964" fill="#f7f3e8"/>
  <line x1="18" y1="62" x2="342" y2="62" stroke="#1b1a16" stroke-width="2"/>
  <text x="18" y="38" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#2e6231">RUNTIME DIAGRAM 01</text>
  <text x="342" y="38" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#8b441c">FLOW</text>
  <path d="M180 204L180 228" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M180 344L180 368" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M180 484L180 508" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M180 624L180 648" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M180 764L180 788" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/><g>
    <rect x="24" y="92" width="312" height="112" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="108" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="134" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Restore thread</tspan>
  </text>
    <text x="180" y="170" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">goal, lineage, permissions</tspan>
  </text>
  </g>
<g>
    <rect x="24" y="232" width="312" height="112" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="248" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="274" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Resolve tool mode</tspan>
  </text>
    <text x="180" y="310" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">model-specific action surface</tspan>
  </text>
  </g>
<g>
    <rect x="24" y="372" width="312" height="112" fill="#dce8eb" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="388" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">OPERATOR</text>
    <text x="180" y="414" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Buffer prompt</tspan>
  </text>
    <text x="180" y="450" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">pending input</tspan>
  </text>
  </g>
<g>
    <rect x="24" y="512" width="312" height="112" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="528" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="554" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Run hooks</tspan>
  </text>
    <text x="180" y="590" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">inspect, block, add context</tspan>
  </text>
  </g>
<g>
    <rect x="24" y="652" width="312" height="112" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="668" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="694" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Commit turn</tspan>
  </text>
    <text x="180" y="730" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">record accepted state</tspan>
  </text>
  </g>
<g>
    <rect x="24" y="792" width="312" height="112" fill="#e2eadc" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="808" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">MODEL</text>
    <text x="180" y="834" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Invoke model</tspan>
  </text>
    <text x="180" y="870" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">assembled decision envelope</tspan>
  </text>
  </g>
</svg>
