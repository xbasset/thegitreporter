<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 710" role="img" aria-labelledby="title desc">
  <title id="title">How AI Agents Work - Chapter 6: Memory is a stack of contracts</title>
  <desc id="desc">Five nested storage layers move from short-lived high-fidelity turn context to durable records with increasing persistence and distortion risk.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11Z" fill="#1b1a16"/>
    </marker>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#c3bbab" stroke-width="4"/>
    </pattern>
  </defs>
  <rect width="360" height="710" fill="#f7f3e8"/>
  <line x1="18" y1="62" x2="342" y2="62" stroke="#1b1a16" stroke-width="2"/>
  <text x="18" y="38" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#2e6231">RUNTIME DIAGRAM 06</text>
  <text x="342" y="38" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#8b441c">LAYERS</text>
  <text x="20" y="94" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#8b441c">SHORT-LIVED / HIGH-FIDELITY</text>
    <g>
    <rect x="20" y="110" width="320" height="96" fill="#e2eadc" stroke="#1b1a16" stroke-width="2"/>
    <text x="34" y="126" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">MODEL</text>
    <text x="180" y="152" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Turn context</tspan>
  </text>
    <text x="180" y="179.5" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">selected, short-lived, high</tspan>
    <tspan x="180" dy="17">fidelity</tspan>
  </text>
  </g>
<g>
    <rect x="34" y="222" width="292" height="96" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="48" y="238" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="264" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Thread history</tspan>
  </text>
    <text x="180" y="291.5" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">durable conversational</tspan>
    <tspan x="180" dy="17">record</tspan>
  </text>
  </g>
<g>
    <rect x="48" y="334" width="264" height="96" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="62" y="350" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="376" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Notes and memories</tspan>
  </text>
    <text x="180" y="403.5" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">typed writes with</tspan>
    <tspan x="180" dy="17">provenance</tspan>
  </text>
  </g>
<g>
    <rect x="62" y="446" width="236" height="96" fill="#e7e3da" stroke="#1b1a16" stroke-width="2"/>
    <text x="76" y="462" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">ENVIRONMENT</text>
    <text x="180" y="488" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Indexes and caches</tspan>
  </text>
    <text x="180" y="515.5" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">derived and</tspan>
    <tspan x="180" dy="17">rebuildable</tspan>
  </text>
  </g>
<g>
    <rect x="76" y="558" width="208" height="96" fill="#e7e3da" stroke="#1b1a16" stroke-width="2"/>
    <text x="90" y="574" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">ENVIRONMENT</text>
    <text x="180" y="590" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Archive and</tspan>
    <tspan x="180" dy="20">audit</tspan>
  </text>
    <text x="180" y="627.5" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">long-lived, costly</tspan>
    <tspan x="180" dy="17">to correct</tspan>
  </text>
  </g>
    <text x="340" y="690" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#2e6231">PERSISTENCE / DISTORTION RISK</text>
</svg>
