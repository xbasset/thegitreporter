<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How AI Agents Work - Chapter 7: The approval decision path</title>
  <desc id="desc">A proposed action passes through classification, scoped prior grants, and a human decision before execution and an audit receipt.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11Z" fill="#1b1a16"/>
    </marker>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#c3bbab" stroke-width="4"/>
    </pattern>
  </defs>
  <rect width="1200" height="680" fill="#f7f3e8"/>
  <line x1="42" y1="78" x2="1158" y2="78" stroke="#1b1a16" stroke-width="3"/>
  <text x="42" y="48" font-family="SFMono-Regular, Consolas, monospace" font-size="24" font-weight="800" fill="#2e6231">RUNTIME DIAGRAM 07</text>
  <text x="1158" y="48" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace" font-size="19" font-weight="800" fill="#8b441c">GATES</text>
  <path d="M242 197L282 197" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
<path d="M482 197L522 197" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
<path d="M722 197L762 197" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/><g>
    <rect x="42" y="135" width="200" height="125" fill="#e2eadc" stroke="#1b1a16" stroke-width="3"/>
    <text x="56" y="155" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">MODEL</text>
    <text x="142" y="176" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="142" dy="0">Proposed</tspan>
    <tspan x="142" dy="22">action</tspan>
  </text>
    <text x="142" y="221" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="142" dy="0">exact arguments and</tspan>
    <tspan x="142" dy="16">effect</tspan>
  </text>
  </g>
<g>
    <rect x="282" y="135" width="200" height="125" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="296" y="155" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="382" y="187" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="382" dy="0">Classify risk</tspan>
  </text>
    <text x="382" y="229" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="382" dy="0">authority change</tspan>
  </text>
  </g>
<g>
    <rect x="522" y="135" width="200" height="125" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="536" y="155" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="622" y="187" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="622" dy="0">Check grants</tspan>
  </text>
    <text x="622" y="221" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="622" dy="0">scope, inherit,</tspan>
    <tspan x="622" dy="16">expiry</tspan>
  </text>
  </g>
<g>
    <rect x="762" y="135" width="200" height="125" fill="#dce8eb" stroke="#1b1a16" stroke-width="3"/>
    <text x="776" y="155" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">OPERATOR</text>
    <text x="862" y="176" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="862" dy="0">Human</tspan>
    <tspan x="862" dy="22">decision</tspan>
  </text>
    <text x="862" y="221" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="862" dy="0">approve, deny,</tspan>
    <tspan x="862" dy="16">timeout</tspan>
  </text>
  </g>
  <path d="M862 260L840 355" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
  <g>
    <rect x="740" y="360" width="200" height="115" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="754" y="380" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="840" y="401" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="840" dy="0">Bound</tspan>
    <tspan x="840" dy="22">executor</tspan>
  </text>
    <text x="840" y="454" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="840" dy="0">approved principal</tspan>
  </text>
  </g>
  <path d="M940 417L970 417" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
  <g>
    <rect x="970" y="360" width="188" height="115" fill="#e7e3da" stroke="#1b1a16" stroke-width="3"/>
    <text x="984" y="380" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">ENVIRONMENT</text>
    <text x="1064" y="401" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="1064" dy="0">Environment</tspan>
    <tspan x="1064" dy="22">effect</tspan>
  </text>
    <text x="1064" y="454" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="1064" dy="0">commit or reject</tspan>
  </text>
  </g>
  <path d="M970 475L860 520" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
  <g>
    <rect x="740" y="525" width="240" height="110" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="754" y="545" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="860" y="577" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="860" dy="0">Audit receipt</tspan>
  </text>
    <text x="860" y="619" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="860" dy="0">decision plus outcome</tspan>
  </text>
  </g>
  <path d="M800 260H680V580H740" fill="none" stroke="#1b1a16" stroke-width="3" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
  <text x="825" y="335" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="800" fill="#2e6231">ALLOW</text>
  <text x="585" y="565" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="800" fill="#8b441c">DENY / TIMEOUT</text>
</svg>
