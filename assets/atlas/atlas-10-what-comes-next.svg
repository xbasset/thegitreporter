<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How AI Agents Work - Chapter 10: Three futures from the same runtime plumbing</title>
  <desc id="desc">Three parallel scenario panels compare supervised agent organizations, governed capability markets, and managed but opaque runtime stacks.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11Z" fill="#1b1a16"/>
    </marker>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#c3bbab" stroke-width="4"/>
    </pattern>
  </defs>
  <rect width="1200" height="680" fill="#f7f3e8"/>
  <line x1="42" y1="78" x2="1158" y2="78" stroke="#1b1a16" stroke-width="3"/>
  <text x="42" y="48" font-family="SFMono-Regular, Consolas, monospace" font-size="24" font-weight="800" fill="#2e6231">RUNTIME DIAGRAM 10</text>
  <text x="1158" y="48" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace" font-size="19" font-weight="800" fill="#8b441c">SCENARIOS</text>
  <g>
    <rect x="420" y="105" width="360" height="105" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="434" y="125" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="600" y="157" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="600" dy="0">Present runtime signals</tspan>
  </text>
    <text x="600" y="188" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="600" dy="0">dynamic tools, delivered policy,</tspan>
    <tspan x="600" dy="16">correlated events</tspan>
  </text>
  </g>
  <path d="M600 210L207 270" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
<path d="M600 210L600 270" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
<path d="M600 210L993 270" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
  <g>
    <rect x="42" y="270" width="330" height="300" fill="#dce8eb" stroke="#1b1a16" stroke-width="3"/>
    <text x="60" y="290" font-family="SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#8b441c">OPERATOR</text>
    <text x="207" y="369.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="900" fill="#10100d">
    <tspan x="207" dy="0">Supervised</tspan>
    <tspan x="207" dy="29">organizations</tspan>
  </text>
    <text x="207" y="476.5" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="17" font-weight="700" fill="#6c665a">
    <tspan x="207" dy="0">accountable workers and</tspan>
    <tspan x="207" dy="19">recoverable work</tspan>
  </text>
  </g>
<g>
    <rect x="435" y="270" width="330" height="300" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="453" y="290" font-family="SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="600" y="369.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="900" fill="#10100d">
    <tspan x="600" dy="0">Governed</tspan>
    <tspan x="600" dy="29">capability markets</tspan>
  </text>
    <text x="600" y="476.5" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="17" font-weight="700" fill="#6c665a">
    <tspan x="600" dy="0">inspectable discovery and</tspan>
    <tspan x="600" dy="19">activation</tspan>
  </text>
  </g>
<g>
    <rect x="828" y="270" width="330" height="300" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="846" y="290" font-family="SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="993" y="369.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="900" fill="#10100d">
    <tspan x="993" dy="0">Managed opaque</tspan>
    <tspan x="993" dy="29">stacks</tspan>
  </text>
    <text x="993" y="476.5" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="17" font-weight="700" fill="#6c665a">
    <tspan x="993" dy="0">stronger control, weaker</tspan>
    <tspan x="993" dy="19">local audit</tspan>
  </text>
  </g>
  <text x="600" y="625" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="18" font-weight="800" fill="#2e6231">EACH BRANCH IS A FALSIFIABLE FORECAST</text>
</svg>
