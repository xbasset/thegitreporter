<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How AI Agents Work - Chapter 9: From trust claim to residual risk</title>
  <desc id="desc">An assurance chain connects a bounded trust claim to policy provenance, runtime controls, action lineage, recovery evidence, and explicit residual risk.</desc>
