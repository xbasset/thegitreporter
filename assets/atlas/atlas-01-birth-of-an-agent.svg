<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How AI Agents Work - Chapter 1: Before the first model request</title>
  <desc id="desc">A six-step flow shows thread restoration, tool-mode resolution, pending input, prompt hooks, policy decisions, and the assembled model request.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11Z" fill="#1b1a16"/>
    </marker>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#c3bbab" stroke-width="4"/>
    </pattern>
  </defs>
  <rect width="1200" height="680" fill="#f7f3e8"/>
  <line x1="42" y1="78" x2="1158" y2="78" stroke="#1b1a16" stroke-width="3"/>
  <text x="42" y="48" font-family="SFMono-Regular, Consolas, monospace" font-size="24" font-weight="800" fill="#2e6231">RUNTIME DIAGRAM 01</text>
  <text x="1158" y="48" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace" font-size="19" font-weight="800" fill="#8b441c">FLOW</text>
  <path d="M362 210L440 210" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M760 210L838 210" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/><path d="M1158 210V360H42V435" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/><path d="M362 510L440 510" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M760 510L838 510" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/><g>
    <rect x="42" y="135" width="320" height="150" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="60" y="155" font-family="SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="202" y="192" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="900" fill="#10100d">
    <tspan x="202" dy="0">Restore thread</tspan>
  </text>
    <text x="202" y="243" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="17" font-weight="700" fill="#6c665a">
    <tspan x="202" dy="0">goal, lineage, permissions</tspan>
  </text>
  </g>
<g>
    <rect x="440" y="135" width="320" height="150" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="458" y="155" font-family="SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="600" y="192" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="900" fill="#10100d">
    <tspan x="600" dy="0">Resolve tool mode</tspan>
  </text>
    <text x="600" y="233.5" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="17" font-weight="700" fill="#6c665a">
    <tspan x="600" dy="0">model-specific action</tspan>
    <tspan x="600" dy="19">surface</tspan>
  </text>
  </g>
<g>
    <rect x="838" y="135" width="320" height="150" fill="#dce8eb" stroke="#1b1a16" stroke-width="3"/>
    <text x="856" y="155" font-family="SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#8b441c">OPERATOR</text>
    <text x="998" y="192" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="900" fill="#10100d">
    <tspan x="998" dy="0">Buffer prompt</tspan>
  </text>
    <text x="998" y="243" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="17" font-weight="700" fill="#6c665a">
    <tspan x="998" dy="0">pending input</tspan>
  </text>
  </g>
<g>
    <rect x="42" y="435" width="320" height="150" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="60" y="455" font-family="SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="202" y="492" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="900" fill="#10100d">
    <tspan x="202" dy="0">Run hooks</tspan>
  </text>
    <text x="202" y="533.5" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="17" font-weight="700" fill="#6c665a">
    <tspan x="202" dy="0">inspect, block, add</tspan>
    <tspan x="202" dy="19">context</tspan>
  </text>
  </g>
<g>
    <rect x="440" y="435" width="320" height="150" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="458" y="455" font-family="SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="600" y="492" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="900" fill="#10100d">
    <tspan x="600" dy="0">Commit turn</tspan>
  </text>
    <text x="600" y="543" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="17" font-weight="700" fill="#6c665a">
    <tspan x="600" dy="0">record accepted state</tspan>
  </text>
  </g>
<g>
    <rect x="838" y="435" width="320" height="150" fill="#e2eadc" stroke="#1b1a16" stroke-width="3"/>
    <text x="856" y="455" font-family="SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#8b441c">MODEL</text>
    <text x="998" y="492" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="900" fill="#10100d">
    <tspan x="998" dy="0">Invoke model</tspan>
  </text>
    <text x="998" y="533.5" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="17" font-weight="700" fill="#6c665a">
    <tspan x="998" dy="0">assembled decision</tspan>
    <tspan x="998" dy="19">envelope</tspan>
  </text>
  </g>
</svg>
