<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How AI Agents Work - Chapter 3: From model proposal to external effect</title>
  <desc id="desc">A swimlane transaction moves a proposed tool call from the model through runtime validation, policy, an optional operator decision, authorization, a bound executor, the environment effect, and a typed receipt.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11Z" fill="#1b1a16"/>
    </marker>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#c3bbab" stroke-width="4"/>
    </pattern>
  </defs>
  <rect width="1200" height="680" fill="#f7f3e8"/>
  <line x1="42" y1="78" x2="1158" y2="78" stroke="#1b1a16" stroke-width="3"/>
  <text x="42" y="48" font-family="SFMono-Regular, Consolas, monospace" font-size="24" font-weight="800" fill="#2e6231">RUNTIME DIAGRAM 03</text>
  <text x="1158" y="48" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace" font-size="19" font-weight="800" fill="#8b441c">TRANSACTION</text>
  <g>
      <text x="42" y="132" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">MODEL</text>
      <line x1="42" y1="150" x2="1158" y2="150" stroke="#b8b09f" stroke-width="2"/>
    </g>
<g>
      <text x="42" y="252" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
      <line x1="42" y1="270" x2="1158" y2="270" stroke="#b8b09f" stroke-width="2"/>
    </g>
<g>
      <text x="42" y="372" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">OPERATOR</text>
      <line x1="42" y1="390" x2="1158" y2="390" stroke="#b8b09f" stroke-width="2"/>
    </g>
<g>
      <text x="42" y="492" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">ENVIRONMENT</text>
      <line x1="42" y1="510" x2="1158" y2="510" stroke="#b8b09f" stroke-width="2"/>
    </g><path d="M171 150L183 270" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
<path d="M312 270L324 270" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
<path d="M453 270L465 390" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)" stroke-dasharray="10 10"/>
<path d="M594 390L606 270" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)" stroke-dasharray="10 10"/>
<path d="M735 270L747 270" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
<path d="M876 270L888 510" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>
<path d="M1017 510L1029 270" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>


<path d="M453 270L606 270" fill="none" stroke="#1b1a16" stroke-width="3" marker-end="url(#arrow)"/>



<g>
    <rect x="42" y="95" width="129" height="110" fill="#e2eadc" stroke="#1b1a16" stroke-width="3"/>
    <text x="56" y="115" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">MODEL</text>
    <text x="106.5" y="136" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="106.5" dy="0">Propose</tspan>
    <tspan x="106.5" dy="22">call</tspan>
  </text>
    <text x="106.5" y="181" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="106.5" dy="0">name plus</tspan>
    <tspan x="106.5" dy="16">arguments</tspan>
  </text>
  </g>
<g>
    <rect x="183" y="215" width="129" height="110" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="197" y="235" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
