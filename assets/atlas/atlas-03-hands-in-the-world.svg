    <tspan x="247.5" dy="0">Validate</tspan>
  </text>
    <text x="247.5" y="301" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="13" font-weight="700" fill="#6c665a">
    <tspan x="247.5" dy="0">schema and</tspan>
    <tspan x="247.5" dy="16">registration</tspan>
  </text>
  </g>
<g>
    <rect x="324" y="215" width="129" height="110" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="338" y="235" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="388.5" y="256" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="388.5" dy="0">Check</tspan>
    <tspan x="388.5" dy="22">policy</tspan>
  </text>
    <text x="388.5" y="301" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="388.5" dy="0">grants and</tspan>
    <tspan x="388.5" dy="16">limits</tspan>
  </text>
  </g>
<g>
    <rect x="465" y="335" width="129" height="110" fill="#dce8eb" stroke="#1b1a16" stroke-width="3"/>
    <text x="479" y="355" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">OPERATOR</text>
    <text x="529.5" y="376" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="900" fill="#10100d">
    <tspan x="529.5" dy="0">Operator</tspan>
    <tspan x="529.5" dy="22">decision</tspan>
  </text>
    <text x="529.5" y="421" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="529.5" dy="0">only when</tspan>
    <tspan x="529.5" dy="16">required</tspan>
  </text>
  </g>
<g>
    <rect x="606" y="215" width="129" height="110" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="620" y="235" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="670.5" y="267" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="670.5" dy="0">Authorize</tspan>
  </text>
    <text x="670.5" y="301" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="670.5" dy="0">policy +</tspan>
    <tspan x="670.5" dy="16">any consent</tspan>
  </text>
  </g>
<g>
    <rect x="747" y="215" width="129" height="110" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="761" y="235" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="811.5" y="256" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="900" fill="#10100d">
    <tspan x="811.5" dy="0">Bound</tspan>
    <tspan x="811.5" dy="22">executor</tspan>
  </text>
    <text x="811.5" y="301" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="811.5" dy="0">selected</tspan>
    <tspan x="811.5" dy="16">principal</tspan>
  </text>
  </g>
<g>
    <rect x="888" y="455" width="129" height="110" fill="#e7e3da" stroke="#1b1a16" stroke-width="3"/>
    <text x="902" y="475" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">ENVIRONMENT</text>
    <text x="952.5" y="496" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="900" fill="#10100d">
    <tspan x="952.5" dy="0">Environment</tspan>
    <tspan x="952.5" dy="22">effect</tspan>
  </text>
    <text x="952.5" y="541" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="952.5" dy="0">commit or</tspan>
    <tspan x="952.5" dy="16">reject</tspan>
  </text>
  </g>
<g>
    <rect x="1029" y="215" width="129" height="110" fill="#eee6d2" stroke="#1b1a16" stroke-width="3"/>
    <text x="1043" y="235" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="1093.5" y="256" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="900" fill="#10100d">
    <tspan x="1093.5" dy="0">Record</tspan>
    <tspan x="1093.5" dy="22">receipt</tspan>
  </text>
    <text x="1093.5" y="301" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700" fill="#6c665a">
    <tspan x="1093.5" dy="0">result +</tspan>
    <tspan x="1093.5" dy="16">evidence</tspan>
  </text>
  </g>
</svg>
