<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1025" role="img" aria-labelledby="title desc">
  <title id="title">How AI Agents Work - Chapter 7: The approval decision path</title>
  <desc id="desc">A proposed action passes through classification, scoped prior grants, and a human decision before execution and an audit receipt.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11Z" fill="#1b1a16"/>
    </marker>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#c3bbab" stroke-width="4"/>
    </pattern>
  </defs>
  <rect width="360" height="1025" fill="#f7f3e8"/>
  <line x1="18" y1="62" x2="342" y2="62" stroke="#1b1a16" stroke-width="2"/>
  <text x="18" y="38" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#2e6231">RUNTIME DIAGRAM 07</text>
  <text x="342" y="38" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#8b441c">GATES</text>
  <g>
    <rect x="24" y="92" width="312" height="104" fill="#e2eadc" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="108" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">MODEL</text>
    <text x="180" y="134" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Proposed action</tspan>
  </text>
    <text x="180" y="170" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">exact arguments and effect</tspan>
  </text>
  </g>
<g>
    <rect x="24" y="220" width="312" height="104" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="236" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="262" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Classify risk</tspan>
  </text>
    <text x="180" y="298" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">authority change</tspan>
  </text>
  </g>
<g>
    <rect x="24" y="348" width="312" height="104" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="364" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="390" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Check grants</tspan>
  </text>
    <text x="180" y="426" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">scope, inherit, expiry</tspan>
  </text>
  </g>
<g>
    <rect x="24" y="476" width="312" height="104" fill="#dce8eb" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="492" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">OPERATOR</text>
    <text x="180" y="518" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Human decision</tspan>
  </text>
    <text x="180" y="554" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">approve, deny, timeout</tspan>
  </text>
  </g>
    <path d="M180 196L180 216" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M180 324L180 344" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M180 452L180 472" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M180 580L180 630" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
    <g>
    <rect x="24" y="635" width="312" height="104" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="651" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="677" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Bound executor</tspan>
  </text>
    <text x="180" y="713" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">approved principal</tspan>
  </text>
  </g>
    <path d="M180 739L180 765" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
    <g>
    <rect x="24" y="770" width="312" height="104" fill="#e7e3da" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="786" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">ENVIRONMENT</text>
    <text x="180" y="812" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Environment effect</tspan>
  </text>
    <text x="180" y="848" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">commit or reject</tspan>
  </text>
  </g>
    <path d="M180 874L180 900" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
    <g>
    <rect x="24" y="905" width="312" height="104" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="921" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="947" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Audit receipt</tspan>
  </text>
    <text x="180" y="983" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">decision plus outcome</tspan>
  </text>
  </g>
    <path d="M336 528H350V957H336" fill="none" stroke="#1b1a16" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
    <text x="190" y="620" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#2e6231">ALLOW</text>
    <text x="345" y="890" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">DENY / TIMEOUT</text>
</svg>
