<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 618" role="img" aria-labelledby="title desc">
  <title id="title">How AI Agents Work - Chapter 8: The human control loop</title>
  <desc id="desc">A closed supervisory loop moves from runtime state to evidence, human judgment, and a control action that changes the runtime.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11Z" fill="#1b1a16"/>
    </marker>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#c3bbab" stroke-width="4"/>
    </pattern>
  </defs>
  <rect width="360" height="618" fill="#f7f3e8"/>
  <line x1="18" y1="62" x2="342" y2="62" stroke="#1b1a16" stroke-width="2"/>
  <text x="18" y="38" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#2e6231">RUNTIME DIAGRAM 08</text>
  <text x="342" y="38" text-anchor="end" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="800" fill="#8b441c">FEEDBACK</text>
  <path d="M180 196L180 216" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M180 324L180 344" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M180 452L180 472" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/><path d="M336 528H350V144H336" fill="none" stroke="#1b1a16" stroke-width="2" marker-end="url(#arrow)"/><g>
    <rect x="24" y="92" width="312" height="104" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="108" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="134" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Runtime state</tspan>
  </text>
    <text x="180" y="170" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">active sessions and work</tspan>
  </text>
  </g>
<g>
    <rect x="24" y="220" width="312" height="104" fill="#eee6d2" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="236" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">RUNTIME</text>
    <text x="180" y="262" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Evidence surface</tspan>
  </text>
    <text x="180" y="298" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
    <tspan x="180" dy="0">status, trace, diff, prompt</tspan>
  </text>
  </g>
<g>
    <rect x="24" y="348" width="312" height="104" fill="#dce8eb" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="364" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">OPERATOR</text>
    <text x="180" y="390" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="900" fill="#10100d">
    <tspan x="180" dy="0">Human judgment</tspan>
  </text>
    <text x="180" y="426" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" fill="#6c665a">
