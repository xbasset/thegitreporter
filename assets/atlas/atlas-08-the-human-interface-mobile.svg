  </text>
  </g>
<g>
    <rect x="24" y="476" width="312" height="104" fill="#dce8eb" stroke="#1b1a16" stroke-width="2"/>
    <text x="38" y="492" font-family="SFMono-Regular, Consolas, monospace" font-size="16" font-weight="800" fill="#8b441c">OPERATOR</text>
